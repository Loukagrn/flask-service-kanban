<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test API Matrices</title>
</head>
<body>
    <h1>Test Route Addition (/matrices/add)</h1>
    <p>Ouvre la console de ton navigateur (Touche F12) pour voir la réponse du serveur !</p>
    
    <script>
        const data = {
            A: [[1, 2], [3, 4]],
            B: [[5, 6], [7, 8]]
        };
        
        fetch('http://localhost:5001/matrices/add', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(response => response.json())
        .then(data => console.log("Réponse reçue du serveur :", data))
        .catch(error => console.error("Erreur :", error));
    </script>
</body>
</html>
